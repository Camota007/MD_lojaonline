<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MARIA.DIAS — Handmade 1/1</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="brand">MARIA.DIAS</div>
      <nav class="nav">
        <a href="#shop">SHOP</a>
        <a href="#archive">ARCHIVE</a>
        <a href="#info">INFO</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-label="Hero">
        <h1 class="hero-title">ENTER</h1>
        <div class="hero-meta">
          <span class="hero-brand">MARIA.DIAS</span>
          <span class="hero-status">SYSTEM ONLINE</span>
        </div>
      </section>

      <section class="featured" id="shop" aria-labelledby="drop-title">
        <h2 id="drop-title">DROP_001</h2>
        <div class="featured-inner">
          <figure class="featured-figure featured-main">
            <!-- main drop uses local image path images/piece1.jpg -->
            <img src="images/piece1.jpg" alt="CHAOS BLOOM — UNIT_01" />
            <figcaption class="featured-caption">CHAOS BLOOM — UNIT_01 — 1/1</figcaption>
          </figure>
          <div class="featured-actions">
            <button class="btn-outline">VIEW</button>
          </div>
        </div>
      </section>

      <section class="products" id="archive" aria-label="Products">
        <!-- Featured product (first real piece) -->
        <div class="product product--featured">
          <div class="thumb">
            <img src="images/piece1.jpg" alt="CHAOS BLOOM — UNIT_01" />
            <div class="overlay">
              <div class="overlay-inner">
                <span class="badge">1/1</span>
                <span class="note">NOT REPLICABLE</span>
              </div>
            </div>
          </div>
          <div class="meta">
            <div class="name">UNIT_01 — CHAOS BLOOM</div>
            <div class="price">€120</div>
          </div>
        </div>

        <!-- Existing product kept as secondary item -->
        <div class="product">
          <div class="thumb">
            <img src="images/image2.jpg" alt="UNIT_02" />
            <div class="overlay">
              <div class="overlay-inner">
                <span class="badge">1/1</span>
                <span class="note">NOT REPLICABLE</span>
              </div>
            </div>
          </div>
          <div class="meta">
            <div class="name">UNIT_02</div>
            <div class="price">€90</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>you are inside</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
